name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build installer and publish GitHub Release
    uses: ./.github/workflows/build-installer.yml
    with:
      release: true
    secrets: inherit
