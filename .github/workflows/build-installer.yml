name: Build Installer

# Compila el instalador .exe de Windows usando Docker con Inno Setup preinstalado
# Se ejecuta automáticamente cuando se modifican archivos del instalador o manualmente

on:
  push:
    branches: [main]
    paths:
      - 'installer/**'
      - 'middleware/**'
      - 'assets/**'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub Release with the .exe attached'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      release:
        description: 'Create a GitHub Release with the .exe attached'
        required: false
        type: boolean
        default: false

permissions:
  contents: write  # Needed for creating releases

concurrency:
  group: build-installer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-installer:
    name: Build Valueflow-Setup .exe with Docker + Inno Setup
    runs-on: ubuntu-latest

    steps:
      # ============================================
      # 1. Checkout del código
      # ============================================
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      # ============================================
      # 2. Verificar estructura
      # ============================================
      - name: 📁 Verificar estructura
        run: |
          [ -d "middleware" ] || { echo "::error::middleware/ missing"; exit 1; }
          [ -d "assets" ] || { echo "::error::assets/ missing"; exit 1; }
          [ -f "installer/installer.iss" ] || { echo "::error::installer/installer.iss missing"; exit 1; }
          [ -f "installer/install.ps1" ] || { echo "::error::installer/install.ps1 missing"; exit 1; }
          [ -f "installer/install.bat" ] || { echo "::error::installer/install.bat missing"; exit 1; }
          echo "✓ Repository structure OK"

      # ============================================
      # 3. Compilar el instalador con Docker + Inno Setup
      # ============================================
      - name: 🔨 Compilar con Docker (Inno Setup preinstalado)
        run: |
          # Docker con Inno Setup 6.x preinstalado - mucho más confiable que Wine
          docker --version
          echo ""

          # Crear directorio de salida
          mkdir -p installer/output

          # Ejecutar ISCC desde el directorio installer/ (así el OutputDir 'output' es relativo correcto)
          docker run --rm \
            -v "$(pwd):/work" \
            -w /work/installer \
            amake/innosetup:latest \
            /opt/innosetup/ISCC.exe installer.iss 2>&1

          # Verificar que se generó el .exe
          if [ ! -f "installer/output/Valueflow-Setup-v1.0.exe" ]; then
            echo "::error::Installer not generated"
            echo "Looking in installer/output/:"
            ls -la installer/output/ 2>&1 || echo "No directory"
            exit 1
          fi

      # ============================================
      # 4. Verificar el .exe generado
      # ============================================
      - name: ✓ Verificar instalador generado
        run: |
          EXE_FILE="installer/output/Valueflow-Setup-v1.0.exe"

          if [ ! -f "$EXE_FILE" ]; then
            echo "::error::No se generó el instalador .exe"
            ls -la installer/output/ 2>/dev/null || echo "No existe directorio output/"
            exit 1
          fi

          SIZE=$(stat -c%s "$EXE_FILE")
          SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)

          echo ""
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║  ✓ INSTALADOR GENERADO EXITOSAMENTE                   ║"
          echo "╚════════════════════════════════════════════════════════╝"
          echo ""
          echo "  Archivo: $EXE_FILE"
          echo "  Tamaño: ${SIZE_MB} MB (${SIZE} bytes)"
          echo ""

          # Verificación básica del ejecutable (PE header)
          HEAD=$(head -c 2 "$EXE_FILE" | xxd -p)
          if [ "$HEAD" = "4d5a" ]; then
            echo "  ✓ Header PE válido (MZ)"
          else
            echo "  ⚠ Header PE no detectado"
          fi

      # ============================================
      # 5. Subir como artifact
      # ============================================
      - name: 📤 Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: Valueflow-Setup-v1.0-windows
          path: installer/output/Valueflow-Setup-v1.0.exe
          if-no-files-found: error
          retention-days: 30

      # ============================================
      # 6. Crear Release (opcional)
      # ============================================
      - name: 🚀 Crear Release
        if: github.event_name == 'workflow_dispatch' && inputs.release == true
        uses: softprops/action-gh-release@v2
        with:
          files: installer/output/Valueflow-Setup-v1.0.exe
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## 🎉 Valueflow Middleware - Instalador para Windows

            **Instalador profesional** generado automáticamente.

            ### 📦 Instalación
            1. Descarga `Valueflow-Setup-v1.0.exe`
            2. Doble click para ejecutar
            3. Sigue el wizard (Next → Next → Install)
            4. Ingresa credenciales cuando se solicite

            ### 🔧 Requisitos
            - Windows 10/11 o Windows Server 2019+
            - Aspel SAE 10 instalado (incluye `fbclient.dll`)
            - Permisos de administrador

            ---
            🤖 Generado automáticamente por Docker + Inno Setup

      # ============================================
      # 7. Resumen
      # ============================================
      - name: ✅ Resumen
        if: success()
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║  ✓ COMPILACIÓN EXITOSA                               ║"
          echo "╚════════════════════════════════════════════════════════╝"
          echo ""
          echo "📦 Artifact: Valueflow-Setup-v1.0-windows"
          echo "📁 Path: installer/output/Valueflow-Setup-v1.0.exe"
          echo ""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.release }}" = "true" ]; then
            echo "🚀 GitHub Release creada"
          fi